set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"
set -g focus-events on

# Prefix: Ctrl + / (terminals send C-_ for Ctrl+/)
unbind C-b
set -g prefix C-_
bind C-_ send-prefix

set -g base-index 1
set -g status-position top
set -g status-style "bg=green, fg=colour255"
set -g status-left-length 40
set -g status-left ""
set -g message-style "bg=yellow, fg=colour255"

# Window tabs on the left (status-justify left), session name centered
set -g status-format[0] "#[align=left list=on] #{W:#[range=window|#{window_index} #{E:window-status-style}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{E:window-status-current-style}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=centre]#[bold]#S#[default]#[align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

set -g mouse on
set -g mode-keys vi
set -g status-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind C-h resize-pane -L 5
bind C-j resize-pane -D 5
bind C-k resize-pane -U 5
bind C-l resize-pane -R 5

bind a split-window -h -p 25 "claude"

bind X run-shell -b "fish -c 'worktx \"#{session_name}\" \"#{pane_current_path}\"'"

bind -n C-S-h previous-window
bind -n C-S-l next-window

# Worktree sessionizer: fuzzy-pick a worktree, switch/create its session
bind f display-popup -E -d "#{pane_current_path}" "fish -c tsesh"

# Prompt for a name and create/switch to a new session
bind N command-prompt -p "new session:" "new-session -s '%%'"

# Cycle / toggle sessions (mirrors the window bindings above)
bind -n C-S-k switch-client -p
bind -n C-S-j switch-client -n
bind L switch-client -l

# Start selection with 'v' (Visual Mode)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy with 'y' (Yank)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g window-status-current-style 'bg=colour231,fg=green,bold'
set -g window-status-style 'bg=green,fg=colour231'

set -g window-style 'bg=colour254'
set -g window-active-style 'bg=colour231'


# Vim navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
